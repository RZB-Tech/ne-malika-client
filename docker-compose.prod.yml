# Продакшн-компоновка фронтенда.
# Разворачивается на VPS в /opt/nemalika/client.
# Требует внешнюю сеть "web" (см. infra/docker-compose.yml).
#
# Важно: NEXT_PUBLIC_* переменные вшиваются в JS-бандл на этапе СБОРКИ
# образа (в GitHub Actions), а не на этапе запуска контейнера. Значения
# в этом .env влияют только на переменные, которые Next.js читает в
# рантайме (их в проекте сейчас нет) — реальный источник NEXT_PUBLIC_*
# для прод-сборки — GitHub Actions Variables/Secrets, см. infra/README.md.
#
# Использование на сервере:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  web:
    image: ${GHCR_IMAGE:-ghcr.io/OWNER/ne-malika-client}:${IMAGE_TAG:-latest}
    container_name: nemalika-web
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # Traefik v3: матчеры принимают ровно один аргумент, перечисление через
      # запятую (синтаксис v2) роутер не создаёт — только явное ИЛИ.
      - "traefik.http.routers.nemalika-web.rule=Host(`${WEB_DOMAIN:-nemalika.uz}`) || Host(`www.${WEB_DOMAIN:-nemalika.uz}`)"
      - "traefik.http.routers.nemalika-web.entrypoints=websecure"
      - "traefik.http.routers.nemalika-web.tls.certresolver=le"
      - "traefik.http.services.nemalika-web.loadbalancer.server.port=3000"

networks:
  web:
    external: true
