name: CD (client)

on:
  push:
    branches: [main]

concurrency:
  group: cd-client
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/ne-malika-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NEXT_PUBLIC_* вшиваются в JS на этапе сборки — задаём их здесь,
      # значения берутся из Repository Variables (публичные) и Secrets
      # (чувствительные, напр. TELEGRAM_BOT_TOKEN).
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_S3_PUBLIC_BASE=${{ vars.NEXT_PUBLIC_S3_PUBLIC_BASE }}
            NEXT_PUBLIC_YANDEX_SUGGEST_KEY=${{ secrets.NEXT_PUBLIC_YANDEX_SUGGEST_KEY }}
            NEXT_PUBLIC_TELEGRAM_BOT_ID=${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_ID }}
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}
            NEXT_PUBLIC_TELEGRAM_BOT_TOKEN=${{ secrets.NEXT_PUBLIC_TELEGRAM_BOT_TOKEN }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.CLIENT_DEPLOY_PATH }}
            export GHCR_IMAGE=${{ env.IMAGE }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.tag }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
